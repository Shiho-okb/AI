<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <meta name="format-detection" content="telephone=no" />
  <!-- meta情報 -->
  <title>タイトル</title>
  <meta name="description" content="" />
  <meta name="keywords" content="" />
  <!-- ogp -->
  <meta property="og:title" content="" />
  <meta property="og:type" content="" />
  <meta property="og:url" content="" />
  <meta property="og:image" content="" />
  <meta property="og:site_name" content="" />
  <meta property="og:description" content="" />
  <meta name="robots" content="noindex, nofollow" /> <!-- 検索エンジンにインデックスしないよう指示 -->
  <meta name="googlebot" content="noindex, nofollow" /> <!-- Googleのクローラーにインデックスしないよう指示 -->
  <meta name="msnbot" content="noindex, nofollow" /> <!-- Bingのクローラーにインデックスしないよう指示 -->
  <meta name="slurp" content="noindex, nofollow" /> <!-- Yahooのクローラーにインデックスしないよう指示 -->
  <!-- ファビコン -->
  <!-- <link rel="icon" href="" /> -->
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&family=Noto+Sans+JP:wght@100..900&family=Shippori+Mincho:wght@400;500;600;700;800&family=Zen+Maru+Gothic:wght@300;400;500;700;900&display=swap" rel="stylesheet">
  <!-- css -->
  <link rel="stylesheet" href="./css/styles.css">
</head>
<body>
  <div class="l-inner">
    <p class="p-test">サイトが表示されました!</p>

    <!-- c-hexagon-card -->
    <ul class="p-hexagon-card">
      <!-- 皮膚科医監修 -->
      <li class="c-hexagon-card">
        <div class="c-hexagon-card__inner">
          <p class="c-hexagon-card__text">
            <span class="c-hexagon-card__bold">皮膚科医</span>が<br>
            <span class="c-hexagon-card__bold">監修</span>する<br>
            <span class="c-hexagon-card__bottom">医療脱毛</span>
          </p>
        </div>
      </li>

      <!-- 最短90分 -->
      <li class="c-hexagon-card c-hexagon-card--time">
        <div class="c-hexagon-card__inner">
          <p class="c-hexagon-card__text">
            全身脱毛<br>
            <span class="c-hexagon-card__bold">
              <span class="c-hexagon-card__label">最短</span>
              <span class="c-hexagon-card__num">90</span>
              <span class="c-hexagon-card__unit">分</span>
            </span>
            <span class="c-hexagon-card__bottom">で完了</span>
          </p>
        </div>
      </li>

      <!-- 痛みが少ない -->
      <li class="c-hexagon-card c-hexagon-card--pain">
        <div class="c-hexagon-card__inner">
          <p class="c-hexagon-card__text">
            <span class="c-hexagon-card__top">医療脱毛なのに</span><br>
            <span class="c-hexagon-card__bold">痛みが</span><br>
            <span class="c-hexagon-card__bold">少ない</span>
          </p>
        </div>
      </li>
    </ul>

    <!-- c-chart -->
    <div class="p-chart">
      <!-- 1回目の施術チャート -->
      <div class="c-chart">
        <div class="c-chart__inner">
          <div class="c-chart__label">
            <p class="c-chart__label-bg">
              <span class="c-chart__label-text">
                <span class="c-chart__label-num">1</span>回目の施術で
              </span>
            </p>
          </div>
          <div class="c-chart__main">
            <span class="c-chart__num">89</span>
            <span class="c-chart__percent">%</span>
          </div>
          <p class="c-chart__sub">
            の方が<br>
            <span class="c-chart__sub-bold">効果を実感！</span>
          </p>
        </div>
      </div>
      <!-- 2回目の施術チャート -->
      <div class="c-chart c-chart--second">
        <div class="c-chart__inner">
          <div class="c-chart__label">
            <p class="c-chart__label-bg">
              <span class="c-chart__label-text">
                <span class="c-chart__label-num">2</span>回目の施術で
              </span>
            </p>
          </div>
          <div class="c-chart__main">
            <span class="c-chart__num">93</span>
            <span class="c-chart__percent">%</span>
          </div>
          <p class="c-chart__sub">
            の方が<br>
            <span class="c-chart__sub-bold">効果を実感！</span>
          </p>
        </div>
      </div>
    </div>

    <!-- c-reason-card -->
    <div class="p-reason-card__inner">
      <!-- REASON 01 -->
      <div class="c-reason-card">
        <div class="c-reason-card__image">
          <img src="./images/dummy1.webp" alt="クリニック内装の写真" width="250" height="160" loading="lazy" decoding="async">
        </div>
        <div class="c-reason-card__body">
          <span class="c-reason-card__en">REASON</span>
          <p class="c-reason-card__head">
            <span class="c-reason-card__num">
              0<span class="c-reason-card__num-end">1.</span>
            </span>
          </p>
          <h3 class="c-reason-card__title">
            圧倒的！<span class="c-reason-card__title-accent">都内最大級</span>の価格
          </h3>
          <p class="c-reason-card__text">
            エステ脱毛と比較すると、<span class="c-reason-card__marker">医療行為である医療レーザー脱毛は価格が高い印象</span>をお持ちではありませんか？当クリニックは圧倒的な安さで高品質な施術をお約束します。
          </p>
        </div>
      </div>
    </div>

  </div>

  <!-- JavaScript -->
  <script src="https://code.jquery.com/jquery-3.7.1.js" defer></script>
  <script defer src="./js/script.js"></script>
</body>
</html>
