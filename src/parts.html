<html lang="ja">
<head>
  <meta charset="UTF-8" />

  <meta property="og:title" content="" />
  <meta property="og:type" content="" />
  <meta property="og:url" content="" />
  <meta property="og:image" content="" />
  <meta property="og:site_name" content="" />
  <meta property="og:description" content="" />
  <meta name="robots" content="noindex, nofollow" /> <!-- 検索エンジンにインデックスしないよう指示 -->
  <meta name="googlebot" content="noindex, nofollow" /> <!-- Googleのクローラーにインデックスしないよう指示 -->
  <meta name="msnbot" content="noindex, nofollow" /> <!-- Bingのクローラーにインデックスしないよう指示 -->
  <meta name="slurp" content="noindex, nofollow" /> <!-- Yahooのクローラーにインデックスしないよう指示 -->
  <!-- ファビコン -->
  <!-- <link rel="icon" href="" /> -->
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&family=Noto+Sans+JP:wght@100..900&family=Shippori+Mincho:wght@400;500;600;700;800&family=Zen+Maru+Gothic:wght@300;400;500;700;900&display=swap" rel="stylesheet">
  <!-- css -->
  <link rel="stylesheet" href="./css/styles.css">
</head>
<body>
  <div class="l-inner">
    <p class="p-test">サイトが表示されました!</p>

    <!-- c-hexagon-card -->
    <ul class="p-hexagon-card">
      <!-- 皮膚科医監修 -->
      <li class="c-hexagon-card">
        <div class="c-hexagon-card__inner">
          <p class="c-hexagon-card__text">
            <span class="c-hexagon-card__bold">皮膚科医</span>が<br>
            <span class="c-hexagon-card__bold">監修</span>する<br>
            <span class="c-hexagon-card__bottom">医療脱毛</span>
          </p>
        </div>
      </li>

      <!-- 最短90分 -->
      <li class="c-hexagon-card c-hexagon-card--time">
        <div class="c-hexagon-card__inner">
          <p class="c-hexagon-card__text">
            全身脱毛<br>
            <span class="c-hexagon-card__bold">
              <span class="c-hexagon-card__label">最短</span>
              <span class="c-hexagon-card__num">90</span>
              <span class="c-hexagon-card__unit">分</span>
            </span>
            <span class="c-hexagon-card__bottom">で完了</span>
          </p>
        </div>
      </li>

      <!-- 痛みが少ない -->
      <li class="c-hexagon-card c-hexagon-card--pain">
        <div class="c-hexagon-card__inner">
          <p class="c-hexagon-card__text">
            <span class="c-hexagon-card__top">医療脱毛なのに</span><br>
            <span class="c-hexagon-card__bold">痛みが</span><br>
            <span class="c-hexagon-card__bold">少ない</span>
          </p>
        </div>
      </li>
    </ul>

  </div>

  <!-- JavaScript -->
  <script src="https://code.jquery.com/jquery-3.7.1.js" defer></script>
  <script defer src="./js/script.js"></script>
</body>
</html>
